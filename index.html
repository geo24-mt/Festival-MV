        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});

        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
		function addClassToPopupIfMedia(content, popup) {
			var tempDiv = document.createElement('div');
			tempDiv.innerHTML = content;
			if (tempDiv.querySelector('td img')) {
				popup._contentNode.classList.add('media');
					setTimeout(function() {
						popup.update(); }, 10);
			} else {
				popup._contentNode.classList.remove('media');
			}
		}
		
	//Maßstab hinzugefügt
		L.control.scale({
			metric: true,
			imperial: false,
			position: 'bottomleft',
			maxWidth: 200,
		}).addTo(map);
		
        var bounds_group = new L.featureGroup([]);

        map.createPane('pane_GoogleMaps_0');
        map.getPane('pane_GoogleMaps_0').style.zIndex = 400;
        var layer_GoogleMaps_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {

        function pop_Kreise_1(feature, layer) {
			if (feature.properties['GEN'] !== null) {
				layer.bindTooltip(String(feature.properties['GEN']), {
					sticky: true,
					className: 'landkreis-tooltip', 
					direction: 'auto',
					offset: [15, 10]
				});
			}
			layer.on('add', function (e) {
				e.target.getElement().style.cursor = 'default';
			});
		}

        function style_Kreise_1_0() {
            return {
                pane: 'pane_Kreise_1',
                opacity: 1,
                color: 'rgba(129,129,129,1.0)',
                weight: 3.0, 
                fill: true,
				fillOpacity: 0.0,
				interactive: false,
            }
        }
        map.createPane('pane_Kreise_1');
        map.getPane('pane_Kreise_1').style.zIndex = 401;
        map.getPane('pane_Kreise_1').style['mix-blend-mode'] = 'normal';
		
        var layer_Kreise_1 = new L.geoJson(json_Kreise_1, {
            interactive: true,
            pane: 'pane_Kreise_1',
            onEachFeature: pop_Kreise_1,
            style: style_Kreise_1_0,

/******* FESTIVAL-SYMBOLE *******/

		function getFestivalIcon(kategorie) {
			var fileName;
			var kat = String(kategorie).toLowerCase().replace(/\s/g, '');
			if (kat.includes('indie') && kat.includes('electro')) {
				fileName = 'Indie-Electro_symbol.png';
			} else if (kat.includes('pop') && kat.includes('electro')) {
				fileName = 'Pop-Electro_symbol.png';
			} else if (kat.includes('electro')) {
				fileName = 'Electro_symbol.png';
			} else if (kat.includes('akustik')) {
				fileName = 'Akustik_symbol.png';
			} else if (kat.includes('rock')) {
				fileName = 'Rock_symbol.png';
			} else if (kat.includes('indie')) {
				fileName = 'Indie_symbol.png';
			} else {
				fileName = 'background.png'; 
			}
			return 'Symbole/' + fileName;
		}

		var layer_Festivals_Kreis_5 = new L.geoJson(json_Festivals_Kreis_5, {
			interactive: true,
			pane: 'pane_Festivals_Kreis_5',
			onEachFeature: pop_Festivals_Kreis_5,
			pointToLayer: function (feature, latlng) {
				var kat = String(feature.properties['Kategorie']); 
				var isMobile = window.innerWidth <= 768;
				var size = isMobile ? 28 : 44; 
				var anchor = size / 2; 

        var umringAktiv = false;
        if (typeof map !== 'undefined') {
            if ((typeof layer_Zone_1km_4 !== 'undefined' && map.hasLayer(layer_Zone_1km_4)) || 
                (typeof layer_Zone_2km_3 !== 'undefined' && map.hasLayer(layer_Zone_2km_3)) || 
                (typeof layer_Zone_4km_2 !== 'undefined' && map.hasLayer(layer_Zone_4km_2))) {
                umringAktiv = true;
            }
        }

        if (umringAktiv) {
            // Der Stern als Text-Symbol 
            var sternSize = 25;
            var sternIcon = L.divIcon({
                className: 'custom-text-stern',
                html: '<div style="font-size: ' + sternSize + 'px; color: gold; text-shadow: 2px 2px 3px #000;">★</div>',
                iconSize: [sternSize, sternSize],
                iconAnchor: [sternSize / 2, sternSize / 2],
                popupAnchor: [0, -sternSize / 2]
            });
            return L.marker(latlng, {
                icon: sternIcon,
                pane: 'pane_Festivals_Kreis_5',
                interactive: true
            });
        } else {
            // Normales Genre-Icon
            var festivalIcon = L.icon({
                iconUrl: getFestivalIcon(kat),
                iconSize: [size, size],
                iconAnchor: [anchor, anchor],
                popupAnchor: [0, -anchor] 
            });
            return L.marker(latlng, {
                icon: festivalIcon,
                pane: 'pane_Festivals_Kreis_5',
                interactive: true
            });
        }
    }

/******* ROUTING-ICON *********/

var routingAktiv = false;
var routingPanel = null; 
var control = L.Routing.control({
    waypoints: [],
    lineOptions: {
        styles: [{color: '#e74c3c', opacity: 0.8, weight: 6}] 
    },
    language: 'de',
    show: false, 
    routeWhileDragging: true,
    collapsible: false,
    geocoder: L.Control.Geocoder ? L.Control.Geocoder.photon() : null,
	createMarker: function(i, wp, n) {
        // i === 0 ist der Startpunkt
        var istStart = (i === 0);
        var symbol = istStart ? '📍' : '🏁';
        var klassenName = istStart ? 'routing-karte-start' : 'routing-karte-ziel';

        // Leaflet-DivIcon, erlaubt reinen Text (Emojis)
        var emojiIcon = L.divIcon({
            html: `<div class="${klassenName}">${symbol}</div>`,
            className: 'routing-karte-emoji-wrapper', 
            iconSize: [30, 30],
            iconAnchor: [15, 15] 
        });

        return L.marker(wp.latLng, {
            icon: emojiIcon,
            draggable: true          // Die Punkte lassen sich auf der Karte verschieben
        });
    }
}).addTo(map);

control.getContainer().style.display = 'none';

function zeichnePanelInhalt() {
    if (!routingPanel) return;
    var aktuellePunkte = control.getWaypoints();
    var hatStart = aktuellePunkte[0] && aktuellePunkte[0].latLng;
    var hatZiel = aktuellePunkte[1] && aktuellePunkte[1].latLng;

    var startText = hatStart ? "📍 Startpunkt gesetzt" : "❌ Noch kein Startpunkt";
    var zielText = hatZiel ? "🏁 Zielpunkt gesetzt" : "❌ Noch kein Zielpunkt";
    
    // Pur ohne Inline-Styles!
    routingPanel.innerHTML = `
        <div class="routing-panel-header">
            <button id="btnGpsRouting" class="btn-gps-routing">
                 Aktueller Standort
            </button>
        </div>
        <div class="routing-status-text">
            <strong>Reihenfolge der Klicks:</strong><br>
            ${startText}<br>
            ${zielText}
        </div>
        <div id="leaflet-routing-steps">
            <em>Wegbeschreibung erscheint, sobald die Route gezeichnet ist...</em>
        </div>
        <button id="btnRoutingSchliessen" class="btn-routing-close">
             Route schließen & löschen
        </button>
    `;

    document.getElementById('btnGpsRouting').onclick = function(e) {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                var loc = L.latLng(position.coords.latitude, position.coords.longitude);
                var punkte = control.getWaypoints();
                
                if (!punkte[0] || !punkte[0].latLng) {
                    control.spliceWaypoints(0, 1, loc);
                    map.setView(loc, 12);
                } else {
                    control.spliceWaypoints(1, 1, loc);
                }
                zeichnePanelInhalt();
            });
        }
    };
    document.getElementById('btnRoutingSchliessen').onclick = function() {
        routingAktiv = false;
        control.setWaypoints([]);
        routingPanel.style.display = 'none';
    };
}
var RoutingIconControl = L.Control.extend({
    options: { position: 'topright' },

    onAdd: function (map) {
        var container = L.DomUtil.create('div', 'leaflet-routing-wrapper-box');
        var buttonDiv = L.DomUtil.create('div', 'routing-toggle-btn', container);
        buttonDiv.innerHTML = '↩️'; 
        buttonDiv.title = 'Routing aktivieren';
		
        routingPanel = L.DomUtil.create('div', '', container);
        routingPanel.id = 'leaflet-routing-panel';

        L.DomEvent.on(buttonDiv, 'click', function (e) {
            L.DomEvent.stopPropagation(e);
            L.DomEvent.preventDefault(e);
            routingAktiv = !routingAktiv;
            
            if (routingAktiv) {
                routingPanel.style.display = 'block';
                zeichnePanelInhalt();
            } else {
                control.setWaypoints([]);
                routingPanel.style.display = 'none';
            }
        });

        L.DomEvent.disableClickPropagation(container);
        L.DomEvent.disableScrollPropagation(routingPanel);

        return container;
    }
});
map.addControl(new RoutingIconControl());

control.on('routesfound', function(e) {
    zeichnePanelInhalt();
    var beschreibungsDiv = document.getElementById('leaflet-routing-steps');
    if (!beschreibungsDiv) return;

    var routes = e.routes;
    var summary = routes[0].summary;
    
    var distanzKm = (summary.totalDistance / 1000).toFixed(1);
    var zeitMin = Math.round(summary.totalTime / 60);

    var html = `<strong>Route:</strong> ${distanzKm} km (${zeitMin} min)<br><ol style='padding-left: 15px; margin: 5px 0;'>`;
    
    var instructions = routes[0].instructions;
    instructions.forEach(function(instr) {
        html += `<li>${instr.text}</li>`;
    });
    html += "</ol>";
    beschreibungsDiv.innerHTML = html;
});

map.on('click', function(e) {
    if (!routingAktiv) return;
    var punkte = control.getWaypoints();
    
    if (!punkte[0] || !punkte[0].latLng) {
        control.spliceWaypoints(0, 1, e.latlng);
    } else {
        control.spliceWaypoints(1, 1, e.latlng);
    }
    zeichnePanelInhalt();
});

        function pop_Festivals_Kreis_5(feature, layer) {
		if (feature.properties['Festival_Name']) {
        layer.bindTooltip(String(feature.properties['Festival_Name']), {
            sticky: true,

function updateMapLayers(umkreisLayer) {
    // Liste der erlaubten Bahnhöfe zurücksetzen
    erlaubteBahnStops = []; 

    if (umkreisLayer) {
        // Radius in Metern bestimmen
        var maxDistanz = 0;
        if (umkreisLayer === layer_Zone_1km_4) maxDistanz = 1000;
        else if (umkreisLayer === layer_Zone_2km_3) maxDistanz = 2000;
        else if (umkreisLayer === layer_Zone_4km_2) maxDistanz = 4000;

        // Welches Festival ist gerade im Fokus des Nutzers?
        var mapCenter = map.getCenter();
        var aktivesFestival = null;
        var minAbstand = Infinity;

        if (typeof json_Festivals_Kreis_5 !== 'undefined') {
            json_Festivals_Kreis_5.features.forEach(function(f) {
                var festCoords = f.geometry.coordinates;
                var testLatLng = L.latLng(festCoords[1], festCoords[0]);
                var abstandZumCenter = mapCenter.distanceTo(testLatLng);
                
                if (abstandZumCenter < minAbstand) {
                    minAbstand = abstandZumCenter;
                    aktivesFestival = f;
                }
            });
        }

        // Wenn das Festival ermittelt wurde, werden die Distanzen zu den Bahnhöfen berechnet
        if (aktivesFestival && maxDistanz > 0 && typeof json_relevante_stops_7 !== 'undefined') {
            var fCoords = aktivesFestival.geometry.coordinates;
            var festivalLatLng = L.latLng(fCoords[1], fCoords[0]);

            json_relevante_stops_7.features.forEach(function(bahnhofFeature) {
                var coords = bahnhofFeature.geometry.coordinates;
                var bahnLatLng = L.latLng(coords[1], coords[0]);
                
                // Exakte Distanz zwischen diesem Festival und dem Bahnhof berechnen
                var distanz = festivalLatLng.distanceTo(bahnLatLng);

                // Wenn der Bahnhof nah genug dran ist, Name in die Erlaubt-Liste
                if (distanz <= maxDistanz) {
                    erlaubteBahnStops.push(String(bahnhofFeature.properties['name']));
                }
            });
        }
    }

    // Bahnhof-Layer aktualisieren
    layer_relevante_stops_7.clearLayers();
    
    layer_relevante_stops_7.options.filter = function(feature) {
        return erlaubteBahnStops.includes(String(feature.properties['name']));
    };
    
    layer_relevante_stops_7.addData(json_relevante_stops_7);
    
    // Wenn eine Zone aktiv ist,Bahnhöfe auf Karte zeigen
    if (umkreisLayer) {
        layer_relevante_stops_7.addTo(map);
    }
    
    // Festivals neu zeichnen für das Stern-Symbol
    layer_Festivals_Kreis_5.clearLayers();
    layer_Festivals_Kreis_5.addData(json_Festivals_Kreis_5);
}

// Event: Wenn im Menü ein Umkreis eingeschaltet wird
map.on('overlayadd', function(e) {
    var umringe = [layer_Zone_1km_4, layer_Zone_2km_3, layer_Zone_4km_2];
    if (umringe.includes(e.layer)) {
        updateMapLayers(e.layer); 
    }
});

// Event: Wenn Umkreis wieder ausgeschaltet/Karte geleert wird
map.on('overlayremove', function(e) {
    var umringe = [layer_Zone_1km_4, layer_Zone_2km_3, layer_Zone_4km_2];
    if (umringe.includes(e.layer)) {
        erlaubteBahnStops = []; 
        updateMapLayers(null);
        map.removeLayer(layer_relevante_stops_7); 
    }
});

/**************Vergangene Festivals ausschalten**********/

let nurZukuenftige = false;

function toggleVergangeneFestivals(button) {
    // Schalter umlegen & CSS-Klasse umschalten
    nurZukuenftige = !nurZukuenftige;
    button.classList.toggle('aktiv', nurZukuenftige);
    button.innerText = nurZukuenftige ? "Alle Festivals anzeigen" : "Vergangene Festivals ausschalten";

    // Das heutige Datum holen
    let heute = new Date();
    heute.setHours(0,0,0,0);

    // Wenn-dann-sonst Abfrage für jedes Festival
    layer_Festivals_Kreis_5.eachLayer(function(layer) {
        let textDatum = layer.feature.properties['Datum']; // Holt z.B. "28.05.-30.05."
        
        if (textDatum) {
            // Trennen am Bindestrich: Wenn Zeitraum, nimm das Enddatum (teile[1]), sonst das Einzeldatum (teile[0])
            let teile = textDatum.split('-');
            let endDatumString = teile[1] ? teile[1].trim() : teile[0].trim();
            
            // Punkte trennen (Tag, Monat, Jahr)
            let d = endDatumString.split('.');
            let tag = parseInt(d[0]);
            let monat = parseInt(d[1]) - 1;
            let jahr = (d[2] && d[2].trim() !== '') ? parseInt(d[2]) : 2026;

            let festivalEnde = new Date(jahr, monat, tag);

            // Nur vergleichen, wenn das Datum gültig ermittelt wurde
            if (!isNaN(festivalEnde.getTime())) {
                // WENN der Button aktiv ist UND das Festival in der Vergangenheit liegt...
                if (nurZukuenftige && festivalEnde < heute) {
                    map.removeLayer(layer); // ...DANN: Runter von der Karte!
                } else {
                    map.addLayer(layer);    // ...SONST: Auf der Karte lassen/wieder hinzufügen!
                }
            }
        }
    });

    if (typeof filterKarte === "function") {
        filterKarte();
    }
}
